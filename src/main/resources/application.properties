# --- Puerto de la aplicacion (por defecto 8080) ---
server.port=8081

# --- Conexion a MySQL ---
# Reemplazar host, usuario y contraseña segun corresponda.
# Si MySQL esta en la misma PC que corre la app, dejar "localhost".
spring.datasource.url=jdbc:mysql://localhost:3306/control_expedientes?createDatabaseIfNotExist=true&serverTimezone=America/Argentina/Buenos_Aires&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=cande

# --- Hibernate / JPA ---
# update: crea/ajusta las tablas automaticamente a partir de las entidades (comodo mientras desarrollamos)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf ---
# false en desarrollo para que recargue los cambios de HTML sin reiniciar
spring.thymeleaf.cache=false
