<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expedientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
	
	<div class="container py-5">

	    <div class="text-center mb-5">
	        <h1>Lista de Expedientes</h1>
	        <h4 class="text-secondary">Departamento Económico</h4>
	    </div>

		
<div class="container py-4">

    <!-- Buscador y Filtros -->
    <div class="card p-3 mb-4 shadow-sm">
        <div class="row g-3 align-items-end">
            <!-- Buscador por texto (debe ir dentro de un formulario para que funcione) -->
            <div class="col-md-6">
                <form th:action="@{/expedientes}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" class="form-control form-control-sm" 
                           placeholder="Buscar por número o carátula..." th:value="${param.search}">
                    <button type="submit" class="btn btn-primary btn-sm">Buscar</button>
                </form>
            </div>
            
            <!-- Filtro por empleado -->
            <div class="col-md-6">
                <form th:action="@{/expedientes}" method="get" class="d-flex align-items-center justify-content-md-end gap-2">
                    <label class="form-label mb-0 text-nowrap">Ver expedientes de:</label>
                    <select name="empleadoId" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
                        <option value="">Todos</option>
                        <option th:each="emp : ${empleados}"
                                th:value="${emp.id}"
                                th:text="${emp.nombre}"
                                th:selected="${emp.id == empleadoIdSeleccionado}">
                        </option>
                    </select>
                </form>
            </div>
        </div>
    </div>

    <!-- Tabla de Expedientes -->
    <div class="table-responsive">
        <table class="table table-sm table-bordered bg-white align-middle shadow-sm">
			<thead class="table-dark">
			<tr>
			    <th>N° Trámite</th>
			    <th>Carátula</th>
			    <th>Responsable</th>
			    <th>Estado</th>
			    <th>Ingreso</th>
			    <th class="text-center">Acciones</th>
			</tr>
			</thead>
            <tbody>
                <!-- Iteración sobre los expedientes -->
                <tr th:each="exp : ${expedientes}">
                    <!-- Celdas con datos reales que faltaban en tu código -->
					<td class="text-center">

					   <!--<a th:href="@{/expedientes/{n}(n=${exp.numeroTramite})}"
					       class="btn btn-outline-primary btn-sm">
					        Consultar
					    </a>-->

					    <a th:href="@{/notas/nueva(numeroTramite=${exp.numeroTramite})}"
					       class="btn btn-outline-success btn-sm">
					        Responder
					    </a>

					    <a th:href="@{/expedientes/{n}/reasignar(n=${exp.numeroTramite})}"
					       class="btn btn-outline-warning btn-sm">
					        Reasignar
					    </a>

					</td>
                </tr>
                
                <!-- Mensaje de lista vacía corregido a colspan="6" -->
                <tr th:if="${expedientes == null || expedientes.isEmpty()}">
                    <td colspan="6" class="text-muted text-center py-3">No hay expedientes para mostrar.</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
