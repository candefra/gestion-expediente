<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Remitos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-4">

    <nav class="mb-4">
        <a href="/expedientes" class="btn btn-outline-secondary btn-sm">Expedientes</a>
        <a href="/remitos" class="btn btn-secondary btn-sm">Remitos</a>
        <a href="/empleados" class="btn btn-outline-secondary btn-sm">Empleados</a>
        <a href="/notas" class="btn btn-outline-secondary btn-sm">Notas</a>
        <a href="/destinatarios" class="btn btn-outline-secondary btn-sm">Destinatarios frecuentes</a>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Remitos</h1>
        <a href="/remitos/nuevo" class="btn btn-primary btn-sm">+ Cargar remito nuevo</a>
    </div>

    <table class="table table-sm table-bordered bg-white">
        <thead class="table-light">
            <tr>
                <th>N° remito</th>
                <th>Fecha</th>
                <th>Remitente</th>
                <th>Destino</th>
                <th>Expedientes incluidos</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="rem : ${remitos}">
                <td th:text="${rem.numeroRemito}">259839</td>
                <td th:text="${rem.fechaRemito}">2026-02-24</td>
                <td th:text="${rem.remitente}">Mesa de Entradas Catastro</td>
                <td th:text="${rem.destino}">Dpto. Económico</td>
                <td>
                    <span th:each="det, stat : ${rem.detalles}">
                        <span th:text="${det.expediente.numeroTramite}">1228-4899-2026</span><span th:if="${!stat.last}">, </span>
                    </span>
                </td>
            </tr>
            <tr th:if="${remitos.isEmpty()}">
                <td colspan="5" class="text-muted">Todavía no cargaste ningún remito.</td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
