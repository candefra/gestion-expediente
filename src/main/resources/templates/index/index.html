<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Control de Expedientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-5">
        <h1>Control de Expedientes</h1>
        <h5 class="text-secondary">Departamento Económico</h5>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-4 mb-3">

            <div class="card shadow">
                <div class="card-body text-center">

                    <h4>📂</h4>

                    <h5>Expedientes</h5>

                    <p>
                        Consultar y responder expedientes.
                    </p>

                    <a href="/expedientes" class="btn btn-primary">
                        Ingresar
                    </a>

                </div>
            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card shadow">
                <div class="card-body text-center">

                    <h4>📨</h4>

                    <h5>Remitos</h5>

                    <p>
                        Generación y seguimiento.
                    </p>

                    <a href="/remitos" class="btn btn-success">
                        Ingresar
                    </a>

                </div>
            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h4>👥</h4>

                    <h5>Personas</h5>

                    <p>
                        Administrar empleados.
                    </p>

                    <a href="/empleados" class="btn btn-secondary">
                        Ingresar
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
