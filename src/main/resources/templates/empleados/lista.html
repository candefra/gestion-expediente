<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empleados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	    <style>
	        body{
	            background:#edf2f7;
	            font-family:'Segoe UI',sans-serif;
	        }
	        .navbar{
	            border-bottom:4px solid #0b5ed7;
	        }
	        .card{
	            border:none;
	            border-radius:15px;
	            box-shadow:0 6px 18px rgba(0,0,0,.08);
	        }
	        .card-filtros{
	            border-radius:15px;
	        }
	        .table-expedientes{
	            border-radius:15px;
	            overflow:hidden;
	            background:white;
	            box-shadow:0 6px 18px rgba(0,0,0,.08);
	        }
	        .table-expedientes thead{
	            background:#0d6efd;
	            color:white;
	        }
	        .table-expedientes th{
	            border:none;
	            font-size:.80rem;
	            text-transform:uppercase;
	            letter-spacing:.05rem;
	        }
	        .table-expedientes td{
	            padding:15px;
	            vertical-align:middle;
	        }
	        .table tbody tr:hover{
	            background:#eef5ff;
	        }
	        .badge{
	            padding:8px 15px;
	            border-radius:20px;
	        }
	        .btn{
	            border-radius:10px;
	        }
	        .form-control,
	        .form-select{
	            border-radius:10px;
	        }
	    </style>
	</head>
	<body class="bg-light">

	<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
	    <div class="container-fluid px-4">
	        <span class="navbar-brand fw-bold">
	            <i class="bi bi-folder2-open"></i>
	            SIGEC
	        </span>
	        <div class="ms-auto text-white">
	            Departamento Económico
	        </div>
	    </div>
	</nav>
	
	<div class="container py-4">

	    <div class="mb-3">
	        <a href="/index" class="text-decoration-none text-muted small">&larr; Volver al inicio</a>
	    </div>

	    <div class="text-center mb-4">
	        <h1 class="h3 mb-1">Lista de Empleados</h1>
	        <h4 class="text-secondary fw-normal">Departamento Económico</h4>
	    </div>
<div class="container py-4">


    <h1 class="h4 mb-3">Empleados</h1>

    <table class="table table-sm table-bordered bg-white">
        <thead class="table-light">
            <tr>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${empleados}">
                <td th:text="${e.nombre}">Nombre</td>
            </tr>
            <tr th:if="${empleados.isEmpty()}">
                <td class="text-muted">Todavía no hay empleados cargados.</td>
            </tr>
        </tbody>
    </table>

    <h2 class="h6 mt-4">Agregar empleado</h2>
    <form th:action="@{/empleados}" th:object="${empleado}" method="post" class="row g-2">
        <div class="col-auto">
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre y apellido" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Agregar</button>
        </div>
    </form>

</div>
</body>
</html>
