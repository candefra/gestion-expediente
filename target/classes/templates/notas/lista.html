<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-4">

    <nav class="mb-4">
        <a href="/expedientes" class="btn btn-outline-secondary btn-sm">Expedientes</a>
        <a href="/remitos" class="btn btn-outline-secondary btn-sm">Remitos</a>
        <a href="/empleados" class="btn btn-outline-secondary btn-sm">Empleados</a>
        <a href="/notas" class="btn btn-secondary btn-sm">Notas</a>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Notas generadas</h1>
        <a href="/notas/nueva" class="btn btn-primary btn-sm">+ Nueva nota</a>
    </div>

    <table class="table table-sm table-bordered bg-white align-middle">
        <thead class="table-light">
            <tr>
                <th>Documento</th>
                <th>Fecha</th>
                <th>Expediente</th>
                <th>Dirigida a</th>
                <th>Generada por</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="nota : ${notas}">
                <td th:text="${nota.tituloDocumento}">NOTA N° 1/ATER</td>
                <td th:text="${nota.fecha}">2026-01-01</td>
                <td th:text="${nota.expediente.numeroTramite}">1228-4899-2026</td>
                <td th:text="${nota.cargo}">Jefe RT</td>
                <td th:text="${nota.empleado != null ? nota.empleado.nombre : ''}">Empleado</td>
                <td>
                    <form th:action="@{/notas/{id}/estado(id=${nota.id})}" method="post" class="d-flex gap-1">
                        <select name="estado" class="form-select form-select-sm" onchange="this.form.submit()">
                            <option th:each="e : ${estados}"
                                    th:value="${e}"
                                    th:text="${e.etiqueta}"
                                    th:selected="${e == nota.estado}">
                            </option>
                        </select>
                    </form>
                </td>
            </tr>
            <tr th:if="${notas.isEmpty()}">
                <td colspan="6" class="text-muted">Todavía no generaste ninguna nota.</td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
