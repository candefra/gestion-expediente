<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva nota</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-4">

    <!--<nav class="mb-4">
        <a href="/expedientes" class="btn btn-outline-secondary btn-sm">Expedientes</a>
        <a href="/remitos" class="btn btn-outline-secondary btn-sm">Remitos</a>
        <a href="/empleados" class="btn btn-outline-secondary btn-sm">Empleados</a>
        <a href="/notas" class="btn btn-secondary btn-sm">Notas</a>
        <a href="/destinatarios" class="btn btn-outline-secondary btn-sm">Destinatarios frecuentes</a>
    </nav> !-->

    <h1 class="h4 mb-3">Generar nota / providencia</h1>
    <p class="text-muted small">
        Al guardar se descarga el PDF listo para revisar e imprimir, con el número correlativo
        correspondiente a este expediente.
    </p>

    <form th:action="@{/notas}" method="post">

        <div class="row g-3 mb-3">
            <div class="col-auto">
                <label class="form-label">Tipo</label>
                <select name="tipo" class="form-select" required>
                    <option value="">Elegir...</option>
                    <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.etiqueta}"></option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label">Si elegiste "Otro", especificar</label>
                <input type="text" name="tipoOtro" class="form-control">
            </div>
            <div class="col-auto">
                <label class="form-label">Expediente</label>
                <select name="numeroTramite" class="form-select" required>
                    <option value="">Elegir...</option>
                    <option th:each="exp : ${expedientes}"
                            th:value="${exp.numeroTramite}"
                            th:text="${exp.numeroTramite + ' — ' + (exp.caratula ?: '')}"
                            th:selected="${exp.numeroTramite == numeroTramiteSeleccionado}">
                    </option>
                </select>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-auto">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" th:value="${fechaHoy}" required>
            </div>
            <div class="col-auto">
                <label class="form-label">Generada por</label>
                <select name="empleadoId" class="form-select" required>
                    <option value="">Elegir...</option>
                    <option th:each="emp : ${empleados}" th:value="${emp.id}" th:text="${emp.nombre}"></option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Destinatario frecuente (opcional, autocompleta)</label>
            <select id="selectorFrecuente" class="form-select">
                <option value="">— Cargar a mano —</option>
                <option th:each="d : ${destinatariosFrecuentes}"
                        th:value="${d.id}"
                        th:text="${d.cargo + (d.area != null ? ' — ' + d.area : '')}"
                        th:attr="data-cargo=${d.cargo}, data-area=${d.area}, data-nombre=${d.nombre}">
                </option>
            </select>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-auto">
                <label class="form-label">Cargo</label>
                <input type="text" id="campoCargo" name="cargo" class="form-control" placeholder="Jefe RT">
            </div>
            <div class="col-auto">
                <label class="form-label">Área</label>
                <input type="text" id="campoArea" name="area" class="form-control" placeholder="Dirección de Impuesto">
            </div>
            <div class="col-auto">
                <label class="form-label">Nombre</label>
                <input type="text" id="campoNombre" name="nombreDestinatario" class="form-control" placeholder="Dr. Fulano Pérez">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Contenido de la nota</label>
            <textarea name="cuerpo" class="form-control" rows="8" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Generar y descargar</button>
        <a href="/expedientes" class="btn btn-outline-secondary">Cancelar</a>
    </form>

</div>

<script>
document.getElementById('selectorFrecuente').addEventListener('change', function () {
    var opcion = this.options[this.selectedIndex];
    document.getElementById('campoCargo').value = opcion.getAttribute('data-cargo') || '';
    document.getElementById('campoArea').value = opcion.getAttribute('data-area') || '';
    document.getElementById('campoNombre').value = opcion.getAttribute('data-nombre') || '';
});
</script>
</body>
</html>
