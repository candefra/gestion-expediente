<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva nota</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	    <style>
	        body{
	            background:#edf2f7;
	            font-family:'Segoe UI',sans-serif;
	        }
	        .navbar{
	            border-bottom:4px solid #0b5ed7;
	        }
	        .card{
	            border:none;
	            border-radius:15px;
	            box-shadow:0 6px 18px rgba(0,0,0,.08);
	        }
	        .card-filtros{
	            border-radius:15px;
	        }
	        .table-expedientes{
	            border-radius:15px;
	            overflow:hidden;
	            background:white;
	            box-shadow:0 6px 18px rgba(0,0,0,.08);
	        }
	        .table-expedientes thead{
	            background:#0d6efd;
	            color:white;
	        }
	        .table-expedientes th{
	            border:none;
	            font-size:.80rem;
	            text-transform:uppercase;
	            letter-spacing:.05rem;
	        }
	        .table-expedientes td{
	            padding:15px;
	            vertical-align:middle;
	        }
	        .table tbody tr:hover{
	            background:#eef5ff;
	        }
	        .badge{
	            padding:8px 15px;
	            border-radius:20px;
	        }
	        .btn{
	            border-radius:10px;
	        }
	        .form-control,
	        .form-select{
	            border-radius:10px;
	        }
	    </style>
	</head>
	<body class="bg-light">

	<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
	    <div class="container-fluid px-4">
	        <span class="navbar-brand fw-bold">
	            <i class="bi bi-folder2-open"></i>
	            SIGEC
	        </span>
	        <div class="ms-auto text-white">
	            Departamento Económico
	        </div>
	    </div>
	</nav>
	<div class="container py-4">

	    <div class="mb-3">
	        <a href="/index" class="text-decoration-none text-muted small">&larr; Volver al inicio</a>
	    </div>
		<div class="container py-4">
        <h1 class="h3 mt-2 mb-1">Generar nota / providencia</h1>
        <p class="text-muted mb-0">
            Al guardar se descarga el PDF listo para revisar e imprimir, con el número correlativo
            correspondiente a este expediente.
        </p>
    </div>

    <div class="card card-nota">
        <div class="card-body">
			<form th:action="@{/notas}" method="post">

			    <input type="hidden" name="id" th:value="${nota.id}">

			    <div class="seccion-titulo">Datos del trámite</div>
                <div class="row g-3 mb-2">
                    <div class="col-md-4">
                        <label class="form-label">Tipo</label>
						<select name="tipo" class="form-select" required>
						    <option value="">Elegir...</option>
						    <option th:each="t : ${tipos}"
						            th:value="${t}"
						            th:text="${t.etiqueta}"
						            th:selected="${nota.tipo == t}">
						    </option>
						</select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Si elegiste "Otro", especificar</label>
                        <input type="text" name="tipoOtro" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Expediente</label>
                        <select name="numeroTramite" class="form-select" required>
                            <option value="">Elegir...</option>
                            <option th:each="exp : ${expedientes}"
                                    th:value="${exp.numeroTramite}"
                                    th:text="${exp.numeroTramite + ' — ' + (exp.caratula ?: '')}"
                                    th:selected="${exp.numeroTramite == numeroTramiteSeleccionado}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Fecha</label>
						<input type="date" name="fecha" class="form-control" required
						       th:value="${nota.fecha != null ? nota.fecha : fechaHoy}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Generada por</label>
						<select name="empleadoId" class="form-select" required>
						    <option value="">Elegir...</option>

						    <option th:each="emp : ${empleados}"
						            th:value="${emp.id}"
						            th:text="${emp.nombre}"
						            th:selected="${nota.empleado != null && nota.empleado.id == emp.id}">
						    </option>
						</select>
                    </div>
                </div>

				<hr class="divisor"> 

                <div class="seccion-titulo">Destinatario</div>
                <div class="mb-3">
                    <label class="form-label">Destinatario frecuente (opcional, autocompleta los campos)</label>
                    <select id="selectorFrecuente" class="form-select">
                        <option value="">— Cargar a mano —</option>
                        <option th:each="d : ${destinatariosFrecuentes}"
                                th:value="${d.id}"
                                th:text="${d.cargo + (d.area != null ? ' — ' + d.area : '')}"
                                th:attr="data-cargo=${d.cargo}, data-area=${d.area}, data-nombre=${d.nombre}">
                        </option>
                    </select>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Cargo</label>
						<input type="text"
						       id="campoCargo"
						       name="cargo"
						       class="form-control"
						       th:value="${nota.cargo}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Área</label>
						<input type="text"
						       id="campoArea"
						       name="area"
						       class="form-control"
						       th:value="${nota.area}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Nombre</label>
						<input type="text"
						       id="campoNombre"
						       name="nombreDestinatario"
						       class="form-control"
						       th:value="${nota.nombreDestinatario}">
                    </div>
                </div>

                <hr class="divisor">

                <div class="seccion-titulo">Contenido</div>
                <div class="mb-4">
					<label class="form-label">Cuerpo de la nota</label>

					<textarea name="cuerpo" class="form-control" rows="8" required th:text="${nota.cuerpo}"></textarea>
                </div>

                <div class="d-flex gap-2">
					<button 
					type="submit"
					name="accion"
					value="guardar"
					class="btn btn-primary"
					formnovalidate>
					Guardar

					</button>
					
					<button
					type="submit"
					name="accion"
					value="finalizar"
					class="btn btn-success">

					Finalizar

					</button>
					
					<a href="/expedientes"
					class="btn btn-secondary">

					Cancelar

					</a>
					
                </div>
            </form>
        </div>
    </div>

</div>

<script>
document.getElementById('selectorFrecuente').addEventListener('change', function () {
    var opcion = this.options[this.selectedIndex];
    document.getElementById('campoCargo').value = opcion.getAttribute('data-cargo') || '';
    document.getElementById('campoArea').value = opcion.getAttribute('data-area') || '';
    document.getElementById('campoNombre').value = opcion.getAttribute('data-nombre') || '';
});
</script>
</body>
</html>
