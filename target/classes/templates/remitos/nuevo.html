<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo remito</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-4">

    <nav class="mb-4">
        <a href="/expedientes" class="btn btn-outline-secondary btn-sm">Expedientes</a>
        <a href="/remitos" class="btn btn-outline-secondary btn-sm">Remitos</a>
        <a href="/empleados" class="btn btn-outline-secondary btn-sm">Empleados</a>
        <a href="/notas" class="btn btn-outline-secondary btn-sm">Notas</a>
        <a href="/destinatarios" class="btn btn-outline-secondary btn-sm">Destinatarios frecuentes</a>
    </nav>

    <h1 class="h4 mb-3">Cargar remito nuevo</h1>

    <form th:action="@{/remitos}" th:object="${remitoFormulario}" method="post">

        <div class="row g-2 mb-4">
            <div class="col-auto">
                <label class="form-label">N° de remito</label>
                <input type="text" th:field="*{numeroRemito}" class="form-control" required>
            </div>
            <div class="col-auto">
                <label class="form-label">Fecha</label>
                <input type="date" th:field="*{fechaRemito}" class="form-control" required>
            </div>
            <div class="col-auto">
                <label class="form-label">Remitente</label>
                <input type="text" th:field="*{remitente}" class="form-control" placeholder="Mesa de Entradas Catastro">
            </div>
            <div class="col-auto">
                <label class="form-label">Destino</label>
                <input type="text" th:field="*{destino}" class="form-control" placeholder="Dpto. Económico">
            </div>
        </div>

        <h2 class="h6">Expedientes incluidos</h2>
        <p class="text-muted small">Completá una fila por cada expediente del remito. Las filas que dejes vacías se ignoran.</p>

        <table class="table table-sm table-bordered bg-white">
            <thead class="table-light">
                <tr>
                    <th>N° trámite</th>
                    <th>N° único</th>
                    <th>Tipo</th>
                    <th>Carátula</th>
                    <th>Iniciador</th>
                    <th>Origen</th>
                    <th>Fojas</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="detalle, stat : *{detalles}">
                    <td><input type="text" th:field="*{detalles[__${stat.index}__].numeroTramite}" class="form-control form-control-sm"></td>
                    <td><input type="text" th:field="*{detalles[__${stat.index}__].numeroUnico}" class="form-control form-control-sm"></td>
                    <td>
                        <select th:field="*{detalles[__${stat.index}__].tipo}" class="form-select form-select-sm">
                            <option value="">--</option>
                            <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.etiqueta}"></option>
                        </select>
                    </td>
                    <td><input type="text" th:field="*{detalles[__${stat.index}__].caratula}" class="form-control form-control-sm"></td>
                    <td><input type="text" th:field="*{detalles[__${stat.index}__].iniciador}" class="form-control form-control-sm"></td>
                    <td><input type="text" th:field="*{detalles[__${stat.index}__].origen}" class="form-control form-control-sm"></td>
                    <td><input type="number" th:field="*{detalles[__${stat.index}__].fojas}" class="form-control form-control-sm" style="width:70px"></td>
                </tr>
            </tbody>
        </table>

        <button type="submit" class="btn btn-primary">Guardar remito</button>
        <a href="/remitos" class="btn btn-outline-secondary">Cancelar</a>
    </form>

</div>
</body>
</html>
