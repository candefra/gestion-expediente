<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empleados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-4">

    <nav class="mb-4">
        <a href="/expedientes" class="btn btn-outline-secondary btn-sm">Expedientes</a>
        <a href="/remitos" class="btn btn-outline-secondary btn-sm">Remitos</a>
        <a href="/empleados" class="btn btn-secondary btn-sm">Empleados</a>
        <a href="/notas" class="btn btn-outline-secondary btn-sm">Notas</a>
        <a href="/destinatarios" class="btn btn-outline-secondary btn-sm">Destinatarios frecuentes</a>
    </nav>

    <h1 class="h4 mb-3">Empleados</h1>

    <table class="table table-sm table-bordered bg-white">
        <thead class="table-light">
            <tr>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${empleados}">
                <td th:text="${e.nombre}">Nombre</td>
            </tr>
            <tr th:if="${empleados.isEmpty()}">
                <td class="text-muted">Todavía no hay empleados cargados.</td>
            </tr>
        </tbody>
    </table>

    <h2 class="h6 mt-4">Agregar empleado</h2>
    <form th:action="@{/empleados}" th:object="${empleado}" method="post" class="row g-2">
        <div class="col-auto">
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre y apellido" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Agregar</button>
        </div>
    </form>

</div>
</body>
</html>
