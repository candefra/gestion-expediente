# --- Puerto de la aplicacion ---
# Render inyecta su propia variable PORT; si no existe (ej. en tu PC), usa 8081
server.port=${PORT:8081}

# --- Conexion a PostgreSQL ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/control_expedientes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tu_password_local}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate / JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false